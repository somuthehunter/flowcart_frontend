allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  msw: true
  unrs-resolver: true

peerDependencyRules:
  allowedVersions:
    eslint-config-airbnb>eslint: "9"
    eslint-config-airbnb-base>eslint: "9"
    eslint-config-airbnb-typescript>eslint: "9"
    eslint-config-airbnb-typescript>@typescript-eslint/eslint-plugin: "8"
    eslint-config-airbnb-typescript>@typescript-eslint/parser: "8"
    eslint-plugin-storybook>eslint: "9"
    "@typescript-eslint/utils>eslint": "9"
    eslint-config-airbnb>eslint-plugin-react-hooks: "5"
